# 服务器实际生效的 Nginx 配置 (xinweijia.net)
# 服务器路径: /etc/nginx/sites-available/aipic
# 启用方式: sites-enabled/aipic 是软链接 -> sites-available/aipic
#
# 现状:
# - 80 端口: aipic (7861) + 成绩分析 (8000) + 静态站
# - 443 端口: 摄影师预约 (8001) + aipic + 成绩分析 + 静态站
#
# location 优先级要求:
#   - /api/pm/  必须在 /api/ 上面 (前缀更长更具体)
#   - /admin/   独立路径,无冲突
#   - /pm-uploads/  避开成绩分析的 /uploads/ (8000)
#   - 不要碰成绩分析现有的 /api/ 和 /uploads/

server {
    listen 80;
    server_name www.xinweijia.net xinweijia.net _;

    client_max_body_size 100M;

    location /app/ {
        alias /data/NviHo/grade-analysis-web/frontend/dist/;
        index index.html;
        try_files $uri $uri/ /app/index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:8000;
    }

    location / {
        proxy_pass http://127.0.0.1:7861;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}

server {
    listen 443 ssl;
    server_name www.xinweijia.net xinweijia.net;

    ssl_certificate /etc/letsencrypt/live/www.xinweijia.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.xinweijia.net/privkey.pem;

    client_max_body_size 100M;

    # === 摄影师项目 (新增) ===
    location /api/pm/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 20M;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 20M;
    }

    location /pm-uploads/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        expires 7d;
    }
    # === 摄影师项目 结束 ===

    location /app/ {
        alias /data/NviHo/grade-analysis-web/frontend/dist/;
        index index.html;
        try_files $uri $uri/ /app/index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:8000;
    }

    location / {
        proxy_pass http://127.0.0.1:7861;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
