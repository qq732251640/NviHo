# Nginx 配置片段 - 把本项目的 location 加到 xinweijia.net 现有的 server 块里
#
# 服务器现有结构: 成绩分析后端跑在 8000 端口, /api/* 反代过去
# 本项目: 摄影师预约后端跑在 8001 端口, /api/pm/* 和 /admin/* 反代过去
#
# 关键: 因为 /api/pm/ 是 /api/ 的前缀子集, 所以 /api/pm/ 必须写在 /api/ 上面!

server {
    listen 443 ssl http2;
    server_name www.xinweijia.net;

    # ... 现有的 ssl 证书配置, 不动 ...

    # ---------- 摄影师预约项目 ----------
    location /api/pm/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20M;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20M;
    }

    # 上传的图片直接静态服务(京东云 OSS 接通后此 location 可移除)
    # 注意:用 /pm-uploads/ 而不是 /uploads/,避免和成绩分析的 /uploads/ 冲突
    location /pm-uploads/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        expires 7d;
    }

    # ---------- 成绩分析项目(已有, 保留) ----------
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /uploads/ {
        proxy_pass http://127.0.0.1:8000;   # 成绩分析的上传, 保持原状
    }

    # ... 其他现有 location 保留 ...
}
